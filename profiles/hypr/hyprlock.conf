# Lock screen.
# The input field, clock, and date live on the center monitor; every monitor
# gets a blurred screenshot as its background.
#
# `$CENTER` is set by scripts/hyprlock-launch.sh, which detects the geometric
# center monitor at lock time and writes it to ~/.cache/hyprlock-monitors.conf.
# Bind your lock key to that script (not `hyprlock` directly).

source = $HOME/.cache/hyprlock-monitors.conf

general {
    hide_cursor = true
    grace = 0
    ignore_empty_input = true
}

# Blurred screenshot — applied to every monitor.
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.89
    brightness = 0.82
    vibrancy = 0.17
    vibrancy_darkness = 0.0
}

# Time — center monitor.
label {
    monitor = $CENTER
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(216, 222, 233, 0.95)
    font_size = 120
    font_family = Noto Sans Mono
    position = 0, 280
    halign = center
    valign = center
}

# Date — center monitor.
label {
    monitor = $CENTER
    text = cmd[update:60000] echo "$(date +'%A, %B %-d')"
    color = rgba(216, 222, 233, 0.75)
    font_size = 22
    font_family = Noto Sans Mono
    position = 0, 140
    halign = center
    valign = center
}

# User — center monitor.
label {
    monitor = $CENTER
    text = $USER
    color = rgba(216, 222, 233, 0.85)
    font_size = 16
    font_family = Noto Sans Mono
    position = 0, 70
    halign = center
    valign = center
}

# Password prompt — center monitor only.
input-field {
    monitor = $CENTER
    size = 320, 56
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(216, 222, 233, 0.25)
    inner_color = rgba(20, 22, 28, 0.55)
    font_color = rgb(216, 222, 233)
    fade_on_empty = true
    placeholder_text = <i>Password</i>
    hide_input = false
    rounding = 14
    check_color = rgb(204, 136, 34)
    fail_color = rgb(204, 34, 34)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    capslock_color = rgb(255, 200, 0)
    position = 0, 0
    halign = center
    valign = center
}
