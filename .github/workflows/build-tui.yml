name: Build Tui Helper

on:
  push:
    branches: [main]
    paths:
      - 'tui.py'
      - 'pyproject.toml'
      - '.github/workflows/build-tui.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-tui-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install rich==15.0.0 pyinstaller

      - name: Build tui binary with PyInstaller
        run: pyinstaller --onefile --name tui --console tui.py

      - name: Move binary to repo root
        run: |
          mv dist/tui tui
          chmod +x tui

      - name: Commit binary to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tui
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Build tui binary [skip ci]"
          git push origin HEAD:main
